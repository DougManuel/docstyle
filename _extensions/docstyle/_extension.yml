title: docstyle
author: POPCORN Initiative
version: 0.19.0
quarto-required: ">=1.7.29"
contributes:
  formats:
    docx:
      # Reference document generated by pre-render hook from CSS configuration
      reference-doc: _docstyle/reference.docx
      # Suppress Quarto's default title block; author-plate.lua renders it instead
      title-block-style: none

      # Lua filters applied in order
      # page-section injects section breaks for named page styles (landscape, etc.)
      # char-style runs at post-quarto to see expanded shortcodes
      filters:
        - page-section.lua
        - toc-field.lua
        - table-style.lua
        - figure.lua
        - anchor.lua
        - list-style.lua
        - version-history.lua
        - abstract.lua
        - author-plate.lua
        - at: post-quarto
          path: char-style.lua
        - comment-inject.lua
        - revisions-inject.lua
        - zotero-inject.lua

    # Typst/PDF output via bundled preprint template (mvuorre/preprint v1.4.3).
    # Docstyle Lua filters are all openxml-only and return nil for Typst — no interference.
    # Use format: docstyle-typst in _quarto.yml; all preprint-typst options are supported.
    typst:
      functions: [place]
      template: preprint/template.typ
      template-partials:
        - preprint/typst/typst-template.typ
        - preprint/typst-show.typ
        - preprint/definitions.typ
      # PDF/UA-1 tagging is opt-in via `pdf-standard: ua-1` at the QMD
      # or _quarto.yml level. v0.12.0 set it as a format-level default,
      # but standard markdown bulleted lists, images without alt text,
      # and other common content patterns fail UA-1 conformance —
      # making the default too breaking for typical authored content
      # (#136 follow-up). Users who want UA-1 should set
      # `pdf-standard: ua-1` explicitly and verify their content passes
      # (veraPDF or similar).
      filters:
        # Emits sentinel keys for boolean YAML values explicitly set to
        # false, so the typst-show template can distinguish "unset" from
        # "false" before flag-driven elseif fallthroughs (#140).
        - typst-bool-overrides.lua
        - preprint/_extensions/christopherkenny/typst-function/typst-function.lua

    # JATS XML output for open-science infrastructure (PMC, ar5iv,
    # scholarly knowledge graphs, scite, semantic scholar). Quarto/Pandoc
    # already produces well-structured JATS by default (multi-affiliation
    # cross-refs, ORCID, CRediT URIs, <table-wrap>, <element-citation>).
    # docstyle's contribution is a Lua filter that fills the remaining
    # gaps: structured abstract (<sec> blocks), CRediT term
    # normalization, and optional <article-type> setting.
    # Use format: docstyle-jats in _quarto.yml. Composes with
    # docstyle-typst — list both formats to render PDF + JATS from one
    # source. Output uses JATS Archiving DTD v1.2 (PMC ingest target).
    jats:
      filters:
        - jats-fixups.lua
