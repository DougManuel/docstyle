project:
  type: default
  render:
    - libreoffice-source.qmd
  pre-render: ../../../../../_extensions/docstyle/generate-reference.R
  post-render: ../../../../../_extensions/docstyle/update-field-codes.R
  output-dir: output

format:
  docstyle-docx:
    toc: false
    number-sections: false

execute:
  echo: false
  warning: false

docstyle:
  preflight: false
  footer:
    enabled: true
    first-page: true
    left: LibreOffice preservation fixture
    right: Page {page}
